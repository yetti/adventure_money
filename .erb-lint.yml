---
EnableDefaultLinters: true
glob: "**/*.{html,text,js}{+*,}.erb"
exclude:
  - "**/vendor/**/*"
  - "**/node_modules/**/*"
  - "**/tmp/**/*"
  - "**/coverage/**/*"
  - "**/public/**/*"
  - "**/docs/**/*"
  - "**/views/devise/**/*"
linters:
  ErbSafety:
    enabled: true
    better_html_config: .better-html.yml
