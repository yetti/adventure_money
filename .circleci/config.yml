version: 2.1

orbs:
  ruby: circleci/ruby@2.0.0
  node: circleci/node@5.0.3

jobs:
  build:
    docker:
      - image: 'cimg/ruby:3.1.2-browsers'
    steps:
      - checkout
      - ruby/install-deps
      - node/install-packages:
          with-cache: true
          pkg-manager: yarn
  checking:
    docker:
      - image: 'cimg/ruby:3.1.2-browsers'
    steps:
      - checkout
      - ruby/install-deps
      - ruby/rubocop-check:
          format: progress
          label: Inspect with Rubocop
  test:
    docker:
      - image: 'cimg/ruby:3.1.2-browsers'
      - environment:
          POSTGRES_DB: adventure_money_test
          POSTGRES_PASSWORD: money
          POSTGRES_USER: adventure
        image: 'cimg/postgres:14.5'
    parallelism: 1
    environment:
      BUNDLE_JOBS: '3'
      BUNDLE_RETRY: '3'
      PGHOST: 127.0.0.1
      PGPASSWORD: money
      PGUSER: adventure
      RAILS_ENV: test
    steps:
      - checkout
      - ruby/install-deps
      - node/install-packages:
          with-cache: true
          pkg-manager: yarn
      - run:
          command: 'dockerize -wait tcp://localhost:5432 -timeout 1m'
          name: Wait for DB
      - run:
          command: 'bundle exec rails db:schema:load --trace'
          name: Database setup
      - ruby/rspec-test

workflows:
  build_and_test:
    jobs:
      - build
      - checking
      - test:
          requires:
            - build
